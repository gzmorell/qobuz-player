name: Create release, build and upload artifacts

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  build-and-upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            features: "gpio"
          - os: macos-latest
            target: x86_64-apple-darwin
            features: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            features: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: ""
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            features: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak and GNOME SDK
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Sdk//49 org.gnome.Platform//49

      - name: Install dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Build and upload qobuz-player
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: qobuz-player
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload qobuz-player-web
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: qobuz-player-web
          target: ${{ matrix.target }}
          features: ${{ matrix.features || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload qobuz-player-rfid
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: qobuz-player-rfid
          target: ${{ matrix.target }}
          features: ${{ matrix.features || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload qobuz-player-connect
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: qobuz-player-connect
          target: ${{ matrix.target }}
          features: ${{ matrix.features || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}


  flatpak:
      runs-on: ubuntu-latest

      container:
        image: ghcr.io/flatpak/flatpak-builder:gnome-49

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Add Flathub remote
          run: |
            flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

        - name: Build Flatpak
          run: |
            flatpak-builder \
              --repo=repo \
              --force-clean \
              build-dir \
              qobuz-player-gtk/flatpak/manifest.json

        - name: Export Flatpak bundle
          run: |
            flatpak build-bundle \
              repo \
              qobuz-player-gtk-${{ github.ref_name }}.flatpak \
              io.github.you.QobuzPlayer

        - name: Upload Flatpak to release
          uses: softprops/action-gh-release@v2
          with:
            files: qobuz-player-gtk-${{ github.ref_name }}.flatpak
