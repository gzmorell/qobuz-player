<div
  class="scrollbar-thin scrollbar-track-transparent scrollbar-thumb-gray-700 flex w-full snap-x snap-mandatory gap-4 overflow-x-auto p-2 pb-4"
>
  @for (album in albums) {
    <a
      href="/album/{{ album.id }}"
      class="snap-start @if (card_size) { {{
        card_size
      }} } @else { size-32 } h-full shrink-0 transition-transform active:scale-95"
      preload="mousedown"
      preload-images="true"
      hx-boost="true"
    >
      <img
        class="aspect-square rounded-lg object-cover shadow-md transition-shadow hover:shadow-lg"
        alt="{{ album.title }}"
        src="{{ album.image }}"
        loading="lazy"
      />
      <p class="mt-2 truncate text-sm font-medium">{{ album.title }}</p>
      <p class="truncate text-sm text-gray-500">{{ album.artist.name }}</p>
    </a>
  }
</div>
