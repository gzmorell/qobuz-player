@defer (list.html) {
  @for (track in tracks) {
    @defer (list-item.html) {
      <div
        class="group flex items-center justify-between gap-4 rounded-lg p-2 transition-colors hover:bg-white/5 active:bg-white/10"
      >
        <button
          hx-swap="none"
          hx-put="@if(api_by_id){{{click}}{{ track.id }}} @else {{{ click }}{{
            index
          }}}"
          class="flex min-w-0 grow cursor-pointer items-center gap-4 text-left disabled:cursor-default disabled:opacity-50"
          @if(!track.available){disabled}
        >
          <!-- Number / Play Icon / Cover -->
          <div
            class="@if(show_track_cover) {size-12} @else {w-8} flex shrink-0 items-center justify-center"
          >
            @if (show_track_cover) {
              <div class="flex size-12 items-center justify-center">
                <div class="relative size-12 overflow-hidden rounded-md">
                  <div
                    class="@if(track.id == now_playing_id) {opacity-40} h-full w-full rounded-md bg-gray-800 bg-cover bg-center bg-no-repeat"
                    style="background-image: url({{ track.image }});"
                  ></div>

                  @if (track.id == now_playing_id) {
                    <div
                      class="absolute inset-0 grid place-items-center text-blue-500"
                    >
                      <span class="size-6">
                        @defer (icons/play.html) {}
                      </span>
                    </div>
                  }
                </div>
              </div>
            } @else {
              @if (track.id == now_playing_id) {
                <div class="size-5 text-blue-500">
                  @defer (icons/play.html) {}
                </div>
              } @else {
                <span
                  class="text-sm font-medium text-gray-500 transition-colors group-hover:text-white"
                >
                  {{ track.number }}
                </span>
              }
            }
          </div>

          <!-- Text Info -->
          <div class="flex min-w-0 flex-col overflow-hidden">
            <h3
              class="@if(track.id == now_playing_id) {text-blue-500} @else {text-gray-200 group-hover:text-white} truncate text-base font-medium"
            >
              {{ track.title }}
            </h3>
            @if (show_artist && track.artist_name) {
              <p
                class="truncate text-sm text-gray-500 group-hover:text-gray-400"
              >
                {{ track.artist_name }}
              </p>
            }
          </div>
        </button>

        <!-- Metadata & Actions -->
        <div class="flex shrink-0 items-center gap-3">
          @defer (
            info.html;
            hires_available=track.hires_available;
            explicit=track.explicit
          ) {}

          <div
            class="action-group relative size-8 overflow-hidden rounded-full transition-colors hover:bg-white/10"
          >
            <span
              class="pointer-events-none absolute inset-0 flex items-center justify-center text-gray-400 group-hover:text-white"
            >
              @defer (icons/ellipsis-horizontal.html) {}
            </span>
            <input type="hidden" name="track_id" value="{{ track.id }}" />
            <select
              name="action"
              class="size-full cursor-pointer appearance-none opacity-0"
              hx-trigger="change"
              hx-put="/api/track/action"
              hx-swap="none"
              hx-include="closest .action-group"
              hx-on::after-request="this.value=''"
            >
              <option value="" disabled hidden selected>Choose action</option>
              @if (is_favorite) {
                <option value="remove_favorite">Remove from favorites</option>
              } @else {
                <option value="add_favorite">Add to favorites</option>
              }
              <option value="add_to_playlist">Add to playlist</option>
              <option value="add_to_queue">Add to queue</option>
              <option value="play_next">Play next</option>
            </select>
          </div>
        </div>
      </div>
    }
  }
}
