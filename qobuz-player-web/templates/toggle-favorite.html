<button
  class="btn btn-secondary btn-icon size-12 rounded-full border-white/10 bg-white/10 backdrop-blur-md hover:bg-white/20 active:scale-95"
  hx-swap="outerHTML"
  hx-target="this"
  hx-put="{{ api }}/{{
    id
  }}/@if(is_favorite){unset-favorite}@else{set-favorite}"
  @if(is_favorite){
  title="Remove from favorites"
  }
  @else
  {
  title="Add to favorites"
  }
>
  @if (is_favorite) {
    <span class="size-6 text-yellow-500">
      @defer (icons/star-solid.html) {}
    </span>
  } @else {
    <span class="size-6">
      @defer (icons/star.html) {}
    </span>
  }
</button>
